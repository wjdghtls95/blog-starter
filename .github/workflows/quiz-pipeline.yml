name: Quiz Pipeline

on:
  push:
    paths:
      - 'drafts/**'

jobs:
  generate-quiz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new draft file
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'drafts/*.md' 'drafts/*.mdx' | head -1)
          echo "file=$CHANGED" >> $GITHUB_OUTPUT

      - name: Generate quiz and notify Telegram
        if: steps.detect.outputs.file != ''
        env:
          # LLM config — set LLM_PROVIDER to: openai | anthropic | groq | openai-compatible
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          # Set only the key for the provider you're using
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          # Telegram
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Cloudflare
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
          DRAFT_FILE: ${{ steps.detect.outputs.file }}
        run: |
          pip install openai anthropic requests
          python scripts/generate-quiz.py
